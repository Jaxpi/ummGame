<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don't Say Umm - Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-container">
        
        <!-- Welcome Screen -->
        <div id="screen-welcome" class="screen active">
            <h1>Um... Game Companion</h1>
            <div class="menu-buttons">
                <button id="btn-new-game" onclick="navigateTo('screen-team-select')">New Game</button>
                <button id="btn-cards-tab" onclick="alert('Words tab under development!')">Cards</button>
            </div>
        </div>

        <!-- Team Selection Screen -->
        <div id="screen-team-select" class="screen">
            <h2>Select Team to Pick Rules</h2>
            <div class="menu-buttons">
                <button id="btn-team-a" onclick="openRuleSelection('A')">Team A</button>
                <button id="btn-team-b" onclick="openRuleSelection('B')">Team B</button>
                <button id="btn-start-match" class="hidden" onclick="startGameBoard()">Start Match</button>
            </div>
        </div>

        <!-- Rule Selection Screen -->
        <div id="screen-rule-select" class="screen">
            <h2 id="rule-screen-title">Team Selection</h2>
            <p class="subtitle">Tap to select exactly 3 penalty rules:</p>
            <div id="rules-grid" class="grid-6"></div>
            <button id="btn-rules-ready" disabled onclick="confirmRules()">Ready</button>
        </div>

        <!-- Game Board Screen -->
        <div id="screen-game-board" class="screen">
            
            <div id="timer-container">
                <div id="timer-display">60</div>
                <p class="timer-hint">Tap: Play/Pause | Hold 1s: Reset</p>
            </div>

            <!-- Modern Fluid Grid Layout centering cards exactly beside slots 15, 10, 5 -->
            <div class="board-wrapper">
                
                <!-- Left Cards Column (Targeting Team A) -->
                <div class="card-column">
                    <div id="card-left-15" class="penalty-card card-15"><span>Face Down</span></div>
                    <div id="card-left-10" class="penalty-card card-10"><span>Face Down</span></div>
                    <div id="card-left-5" class="penalty-card card-5"><span>Face Down</span></div>
                </div>

                <!-- Central Numeric Columns -->
                <div class="tracks-grid">
                    <div class="track-column">
                        <div class="track-title title-a">Team A</div>
                        <div id="squares-container-A" class="squares-stack"></div>
                    </div>
                    <div class="track-column">
                        <div class="track-title title-b">Team B</div>
                        <div id="squares-container-B" class="squares-stack"></div>
                    </div>
                </div>

                <!-- Right Cards Column (Targeting Team B) -->
                <div class="card-column">
                    <div id="card-right-15" class="penalty-card card-15"><span>Face Down</span></div>
                    <div id="card-right-10" class="penalty-card card-10"><span>Face Down</span></div>
                    <div id="card-right-5" class="penalty-card card-5"><span>Face Down</span></div>
                </div>

            </div>
            
            <button class="abandon-btn" onclick="location.reload()">Abandon Game</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
