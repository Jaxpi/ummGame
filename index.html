<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don't Say Umm - Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app-container">
        
        <!-- Welcome Screen -->
        <div id="screen-welcome" class="screen active">
            <h1>Um... Game Companion</h1>
            <div class="menu-buttons">
                <button id="btn-new-game" onclick="navigateTo('screen-team-select')">New Game</button>
                <button id="btn-cards-tab" onclick="navigateTo('screen-words-view')">Cards / Words</button>
            </div>
        </div>

        <!-- Team Selection Screen -->
        <div id="screen-team-select" class="screen">
            <h2>Select Team to Pick Rules</h2>
            <div class="menu-buttons">
                <button id="btn-team-a" onclick="openRuleSelection('A')">Team A</button>
                <button id="btn-team-b" onclick="openRuleSelection('B')">Team B</button>
                <button id="btn-start-match" class="hidden" onclick="startGameBoard()">Start Match</button>
            </div>
        </div>

        <!-- Rule Selection Screen -->
        <div id="screen-rule-select" class="screen">
            <h2 id="rule-screen-title">Team Selection</h2>
            <p class="subtitle">Tap to select exactly 3 penalty rules:</p>
            <div id="rules-grid" class="grid-6"></div>
            <button id="btn-rules-ready" disabled onclick="confirmRules()">Ready</button>
        </div>

        <!-- Game Board Screen -->
        <div id="screen-game-board" class="screen">
            <div id="timer-container">
                <div id="timer-display">60</div>
                <p class="timer-hint">Tap: Play/Pause | Hold 1s: Reset</p>
            </div>

            <div class="tablet-board-console">
                <!-- ROW 1: Team A Layout -->
                <div class="team-row">
                    <div class="row-header title-a">Team A</div>
                    <div id="squares-container-A" class="squares-row"></div>
                </div>

                <!-- ROW 2: Shared Rule Cards Layout -->
                <div class="cards-display-row">
                    <div class="cards-inner-grid">
                        <div id="card-left-5" class="penalty-card card-milestone-5"><span>Rule</span></div>
                        <div id="card-left-10" class="penalty-card card-milestone-10"><span>Rule</span></div>
                        <div id="card-left-15" class="penalty-card card-milestone-15"><span>Rule</span></div>
                    </div>
                </div>

                <div class="cards-display-row">
                    <div class="cards-inner-grid">
                        <div id="card-right-5" class="penalty-card card-milestone-5"><span>Rule</span></div>
                        <div id="card-right-10" class="penalty-card card-milestone-10"><span>Rule</span></div>
                        <div id="card-right-15" class="penalty-card card-milestone-15"><span>Rule</span></div>
                    </div>
                </div>

                <!-- ROW 3: Team B Layout -->
                <div class="team-row">
                    <div class="row-header title-b">Team B</div>
                    <div id="squares-container-B" class="squares-row"></div>
                </div>
            </div>
            
            <button class="abandon-btn" onclick="resetToHome(event)">Abandon Game</button>
        </div>

        <!-- Words/Cards Tab Screen View -->
        <div id="screen-words-view" class="screen">
            <h2>Words Deck</h2>
            <div class="word-card-box">
                <p class="word-hint">Ready to play?</p>
            </div>
            <div class="menu-buttons">
                <button onclick="resetToHome(event)">Back to Menu</button>
            </div>
        </div>

        <!-- Victory Modal Screen Overlay -->
        <div id="screen-victory" class="screen modal-overlay">
            <div class="victory-card">
                <h2 id="victory-message">Team Wins!</h2>
                <button class="home-btn" onclick="resetToHome(event)">Return Home</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
